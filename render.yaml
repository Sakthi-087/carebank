services:
  - type: web
    name: carebank-backend
    runtime: docker
    region: oregon
    plan: free
    rootDir: carebank-backend
    
    # Dockerfile configuration
    dockerfilePath: Dockerfile
    
    # Environment variables
    envVars:
      - key: SUPABASE_URL
        description: "Your Supabase project URL"
      - key: SUPABASE_ANON_KEY
        description: "Your Supabase anonymous key"
      - key: OPENROUTER_API_KEY
        description: "Your OpenRouter API key (for LLM)"
      - key: FRONTEND_URL
        description: "Your Vercel frontend URL (e.g., https://yourproject.vercel.app)"
      - key: LLM_PROVIDER
        value: "openrouter"
      - key: LLM_BASE_URL
        value: "https://openrouter.ai/api/v1"
      - key: LLM_MODEL
        value: "openai/gpt-4o-mini"
      - key: ENABLE_SAMPLE_DATA_FALLBACK
        value: "false"
    
    # Auto-deploy on push
    autoDeploy: true
    
    # Health check
    healthCheckPath: /health
